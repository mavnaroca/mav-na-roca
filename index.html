<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Venda — Festa na Roça</title>
<style>
  :root{
    --wood-dark:#3b2a1f;
    --wood:#6b4a30;
    --wood-light:#a9784f;
    --cream:#f7f0df;
    --gold:#c99a3e;
    --green:#4f6228;
    --red:#a83232;
    --ink:#241a12;
    --card:#ffffff;
    --bg:#f4ede1;
    --shadow:0 2px 8px rgba(59,42,31,0.15);
    font-family: Arial, Helvetica, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    padding-bottom:90px;
  }
  header{
    background:linear-gradient(135deg,var(--wood-dark),var(--wood));
    color:var(--cream); padding:18px 16px 14px;
    box-shadow:var(--shadow);
  }
  header h1{margin:0; font-size:1.3rem; letter-spacing:.5px;}
  header p{margin:4px 0 0; font-size:.8rem; opacity:.85;}
  #status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:#999;}
  #status-dot.ok{background:#5cb85c;}
  #status-dot.err{background:var(--red);}

  .tabs{
    display:flex; gap:8px; overflow-x:auto; padding:12px 12px 4px;
    -webkit-overflow-scrolling:touch;
  }
  .tab-btn{
    flex:0 0 auto; padding:9px 14px; border-radius:20px; border:1px solid var(--wood-light);
    background:var(--card); color:var(--wood-dark); font-weight:bold; font-size:.85rem;
    cursor:pointer; white-space:nowrap;
  }
  .tab-btn.active{background:var(--gold); color:var(--wood-dark); border-color:var(--gold);}

  main{padding:8px 12px 12px;}

  .item-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px;
    margin-bottom:16px;
  }
  .item-card{
    background:var(--card); border-radius:10px; padding:12px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:6px; border:2px solid transparent;
  }
  .item-card.in-cart{border-color:var(--gold);}
  .item-card .nome{font-weight:bold; font-size:.92rem; line-height:1.2;}
  .item-card .preco{color:var(--wood); font-size:.85rem;}
  .qty-row{display:flex; align-items:center; justify-content:space-between; margin-top:auto;}
  .qty-btn{
    width:32px; height:32px; border-radius:8px; border:none; background:var(--wood);
    color:#fff; font-size:1.1rem; cursor:pointer; line-height:1;
  }
  .qty-btn:active{background:var(--wood-dark);}
  .qty-val{min-width:24px; text-align:center; font-weight:bold;}

  section.card{
    background:var(--card); border-radius:12px; padding:14px; box-shadow:var(--shadow); margin-bottom:16px;
  }
  section.card h2{margin:0 0 10px; font-size:1rem; color:var(--wood-dark);}

  .cart-row{display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px dashed #e3d9c4; font-size:.88rem;}
  .cart-row:last-child{border-bottom:none;}
  .cart-row .rm{color:var(--red); background:none; border:none; cursor:pointer; font-size:1rem; padding:0 4px;}
  .cart-empty{color:#999; font-size:.85rem; padding:6px 0;}

  .totals{margin-top:8px; padding-top:8px; border-top:2px solid var(--wood-light);}
  .totals .row{display:flex; justify-content:space-between; padding:4px 0; font-size:.95rem;}
  .totals .row.total{font-size:1.25rem; font-weight:bold; color:var(--wood-dark);}
  .totals .row.troco{font-weight:bold;}
  .totals .row.troco.ok{color:var(--green);}
  .totals .row.troco.bad{color:var(--red);}

  input[type=number]{
    width:100%; padding:10px; border-radius:8px; border:1px solid #d8cbb0; font-size:1rem;
    font-family:inherit;
  }
  label{font-size:.82rem; color:#6b5a45; font-weight:bold; display:block; margin-bottom:4px;}

  .confirm-btn{
    width:100%; padding:14px; border:none; border-radius:10px; background:var(--green);
    color:#fff; font-size:1.05rem; font-weight:bold; cursor:pointer; margin-top:12px;
  }
  .confirm-btn:disabled{background:#b7b7a4; cursor:not-allowed;}
  .confirm-btn:active:not(:disabled){filter:brightness(.92);}

  .hist-item{padding:8px 0; border-bottom:1px solid #eee; font-size:.85rem;}
  .hist-item .top{display:flex; justify-content:space-between; font-weight:bold; color:var(--wood-dark);}
  .hist-item .sub{color:#777; font-size:.8rem;}

  #toast{
    position:fixed; left:50%; bottom:20px; transform:translateX(-50%) translateY(20px);
    background:var(--wood-dark); color:var(--cream); padding:10px 18px; border-radius:24px;
    font-size:.9rem; opacity:0; transition:all .25s; pointer-events:none; box-shadow:var(--shadow);
    white-space:nowrap;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  details.settings{margin:10px 12px 0; font-size:.8rem; color:#6b5a45;}
  details.settings input{width:100%; padding:8px; border-radius:6px; border:1px solid #d8cbb0; margin-top:6px; font-family:inherit;}
  details.settings .save-url{margin-top:6px; padding:8px 12px; border:none; border-radius:6px; background:var(--wood); color:#fff; cursor:pointer;}

  .refresh-btn{background:none; border:1px solid var(--wood-light); color:var(--wood); border-radius:16px; padding:4px 10px; font-size:.75rem; cursor:pointer; float:right;}
</style>
</head>
<body>

<header>
  <h1>🌾 Venda — Festa na Roça</h1>
  <p><span id="status-dot"></span><span id="status-text">conectando à planilha…</span></p>
</header>

<details class="settings">
  <summary>Configuração (URL do Apps Script)</summary>
  <input type="text" id="script-url-input" placeholder="Cole aqui a URL do Web App do Apps Script (termina em /exec)">
  <button class="save-url" onclick="salvarUrlSessao()">Usar esta URL nesta sessão</button>
  <p style="margin:6px 0 0;">Para deixar isso fixo permanentemente, edite a constante <code>SCRIPT_URL</code> no início do arquivo HTML.</p>
</details>

<div class="tabs" id="tabs"></div>

<main>
  <div class="item-grid" id="item-grid"></div>

  <section class="card">
    <h2>🛒 Carrinho da venda</h2>
    <div id="cart-list"><div class="cart-empty">Nenhum item selecionado ainda.</div></div>
    <div class="totals">
      <div class="row total"><span>Total</span><span id="total-val">R$ 0,00</span></div>
      <div style="margin-top:10px;">
        <label for="recebido">Valor recebido</label>
        <input type="number" id="recebido" inputmode="decimal" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="row troco"><span>Troco</span><span id="troco-val">R$ 0,00</span></div>
    </div>
    <button class="confirm-btn" id="confirm-btn" onclick="confirmarVenda()" disabled>Confirmar Venda</button>
  </section>

  <section class="card">
    <h2>📜 Histórico de vendas <button class="refresh-btn" onclick="carregarHistorico()">atualizar</button></h2>
    <div id="hist-list"><div class="cart-empty">Carregando…</div></div>
  </section>
</main>

<div id="toast"></div>

<script>
// ============================================================
// CONFIGURAÇÃO — cole aqui a URL do seu Apps Script (termina em /exec)
// ============================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFsjJ6oApnr4Xi_YSTeBhiQIZZSa9JNXEhHd37nYjqByr11fpm61x6kVK4YJSEX8bTBQ/exec";
// ============================================================

let scriptUrlSessao = "";
function getScriptUrl(){
  if (scriptUrlSessao) return scriptUrlSessao;
  if (SCRIPT_URL && SCRIPT_URL.indexOf("COLOQUE_AQUI") === -1) return SCRIPT_URL;
  return "";
}
function salvarUrlSessao(){
  const v = document.getElementById('script-url-input').value.trim();
  if (v) { scriptUrlSessao = v; toast("URL definida para esta sessão"); carregarItens(); carregarHistorico(); }
}

let ITENS = [];        // [{barraca,item,valor}]
let BARRACAS = [];
let barracaAtiva = "";
let carrinho = [];      // [{barraca,item,valorUnit,qtd}]

function fmt(v){
  return "R$ " + (Number(v)||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function setStatus(ok, msg){
  const dot = document.getElementById('status-dot');
  dot.className = ok ? 'ok' : 'err';
  document.getElementById('status-text').textContent = msg;
}

async function carregarItens(){
  const url = getScriptUrl();
  if (!url){ setStatus(false, "configure a URL do Apps Script acima ↑"); return; }
  setStatus(false, "conectando à planilha…");
  try{
    const res = await fetch(url + "?action=items");
    const data = await res.json();
    if (!data.ok) throw new Error(data.erro || "erro desconhecido");
    ITENS = data.itens;
    BARRACAS = [...new Set(ITENS.map(i => i.barraca))];
    if (!barracaAtiva) barracaAtiva = BARRACAS[0] || "";
    renderTabs();
    renderItens();
    setStatus(true, "conectado — dados ao vivo da planilha");
  }catch(err){
    setStatus(false, "falha ao conectar: " + err.message);
  }
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = "";
  BARRACAS.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (b === barracaAtiva ? ' active' : '');
    btn.textContent = b;
    btn.onclick = () => { barracaAtiva = b; renderTabs(); renderItens(); };
    tabs.appendChild(btn);
  });
}

function qtdNoCarrinho(barraca, item){
  const linha = carrinho.find(c => c.barraca===barraca && c.item===item);
  return linha ? linha.qtd : 0;
}

function renderItens(){
  const grid = document.getElementById('item-grid');
  grid.innerHTML = "";
  ITENS.filter(i => i.barraca === barracaAtiva).forEach(i => {
    const q = qtdNoCarrinho(i.barraca, i.item);
    const card = document.createElement('div');
    card.className = 'item-card' + (q>0 ? ' in-cart' : '');
    card.innerHTML = `
      <div class="nome">${i.item}</div>
      <div class="preco">${fmt(i.valor)}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="alterarQtd('${escapeAttr(i.barraca)}','${escapeAttr(i.item)}',${i.valor},-1)">–</button>
        <span class="qty-val">${q}</span>
        <button class="qty-btn" onclick="alterarQtd('${escapeAttr(i.barraca)}','${escapeAttr(i.item)}',${i.valor},1)">+</button>
      </div>`;
    grid.appendChild(card);
  });
}

function escapeAttr(s){ return String(s).replace(/'/g,"\\'"); }

function alterarQtd(barraca, item, valorUnit, delta){
  let linha = carrinho.find(c => c.barraca===barraca && c.item===item);
  if (!linha){
    if (delta < 0) return;
    linha = {barraca, item, valorUnit, qtd:0};
    carrinho.push(linha);
  }
  linha.qtd += delta;
  if (linha.qtd <= 0){
    carrinho = carrinho.filter(c => c !== linha);
  }
  renderItens();
  renderCarrinho();
}

function renderCarrinho(){
  const list = document.getElementById('cart-list');
  if (carrinho.length === 0){
    list.innerHTML = '<div class="cart-empty">Nenhum item selecionado ainda.</div>';
  } else {
    list.innerHTML = carrinho.map(c => `
      <div class="cart-row">
        <span>${c.qtd}x ${c.item} <small style="color:#999;">(${c.barraca})</small></span>
        <span>${fmt(c.qtd*c.valorUnit)} <button class="rm" onclick="removerItem('${escapeAttr(c.barraca)}','${escapeAttr(c.item)}')">✕</button></span>
      </div>`).join("");
  }
  const total = carrinho.reduce((s,c)=>s+c.qtd*c.valorUnit,0);
  document.getElementById('total-val').textContent = fmt(total);
  atualizarTroco();
  document.getElementById('confirm-btn').disabled = carrinho.length === 0;
}

function removerItem(barraca, item){
  carrinho = carrinho.filter(c => !(c.barraca===barraca && c.item===item));
  renderItens();
  renderCarrinho();
}

function atualizarTroco(){
  const total = carrinho.reduce((s,c)=>s+c.qtd*c.valorUnit,0);
  const recebido = Number(document.getElementById('recebido').value) || 0;
  const troco = recebido - total;
  const el = document.getElementById('troco-val');
  el.textContent = fmt(Math.abs(troco));
  el.parentElement.classList.remove('ok','bad');
  if (recebido > 0){
    el.parentElement.classList.add(troco >= 0 ? 'ok' : 'bad');
    el.textContent = (troco < 0 ? "falta " : "") + fmt(Math.abs(troco));
  } else {
    el.textContent = fmt(0);
  }
}
document.getElementById('recebido').addEventListener('input', atualizarTroco);

async function confirmarVenda(){
  const url = getScriptUrl();
  if (!url){ toast("Configure a URL do Apps Script primeiro"); return; }
  const total = carrinho.reduce((s,c)=>s+c.qtd*c.valorUnit,0);
  const recebido = Number(document.getElementById('recebido').value) || 0;
  const troco = recebido - total;

  const payload = {
    vendaId: 'v' + Date.now() + '-' + Math.floor(Math.random()*1000),
    barraca: [...new Set(carrinho.map(c=>c.barraca))].join(', '),
    itens: carrinho.map(c => ({item:c.item, qtd:c.qtd, valorUnit:c.valorUnit, subtotal:c.qtd*c.valorUnit})),
    total, recebido, troco,
    dataHora: new Date().toISOString()
  };

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true; btn.textContent = "Salvando…";
  try{
    await fetch(url, {
      method: 'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
    toast("Venda registrada ✔");
    carrinho = [];
    document.getElementById('recebido').value = "";
    renderItens();
    renderCarrinho();
    carregarHistorico();
  }catch(err){
    toast("Erro ao salvar: " + err.message);
  }finally{
    btn.textContent = "Confirmar Venda";
    btn.disabled = carrinho.length === 0;
  }
}

async function carregarHistorico(){
  const url = getScriptUrl();
  if (!url) return;
  const list = document.getElementById('hist-list');
  try{
    const res = await fetch(url + "?action=historico");
    const data = await res.json();
    if (!data.ok) throw new Error(data.erro);
    const vendas = {};
    data.vendas.forEach(v => {
      if (!vendas[v.vendaId]) vendas[v.vendaId] = {dataHora:v.dataHora, barraca:v.barraca, total:v.total, recebido:v.recebido, troco:v.troco, itens:[]};
      vendas[v.vendaId].itens.push(`${v.qtd}x ${v.item}`);
    });
    const arr = Object.values(vendas);
    if (arr.length === 0){
      list.innerHTML = '<div class="cart-empty">Nenhuma venda registrada ainda.</div>';
      return;
    }
    list.innerHTML = arr.slice(0,50).map(v => `
      <div class="hist-item">
        <div class="top"><span>${v.barraca}</span><span>${fmt(v.total)}</span></div>
        <div class="sub">${new Date(v.dataHora).toLocaleString('pt-BR')} · ${v.itens.join(', ')} · recebido ${fmt(v.recebido)} · troco ${fmt(v.troco)}</div>
      </div>`).join("");
  }catch(err){
    list.innerHTML = '<div class="cart-empty">Erro ao carregar histórico: '+err.message+'</div>';
  }
}

let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

// init
carregarItens();
carregarHistorico();
</script>
</body>
</html>
